<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Anmelden – Trainings-App</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#11121a" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div class="login-shell">
    <div class="login-logo"><img src="icon.svg" alt="" /></div>
    <h1 style="font-family: var(--font-display); font-size: 1.5rem; font-weight: 600; margin-bottom: 0.25rem;">Trainings-App</h1>
    <p class="text-muted" style="margin-bottom: 2rem;">Dein persönliches Trainings- &amp; Life-Log</p>
    <form class="login-form" id="login-form">
      <div>
        <label class="label" for="email">E-Mail</label>
        <input class="input" type="email" id="email" autocomplete="email" required />
      </div>
      <div>
        <label class="label" for="password">Passwort</label>
        <input class="input" type="password" id="password" autocomplete="current-password" required />
      </div>
      <p class="text-error hidden" id="error-msg"></p>
      <button class="btn btn-primary" type="submit" id="submit-btn">Anmelden</button>
    </form>
    <p class="login-toggle">
      <span id="toggle-text">Noch kein Konto?</span>
      <a href="#" id="toggle-mode" style="color: var(--ember-400); font-weight: 600;">Registrieren</a>
    </p>
  </div>
  <script type="module" src="js/login.js"></script>
</body>
</html>
